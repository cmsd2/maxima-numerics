name: Docs

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y texinfo
          # Install modern Pandoc (apt version is too old for Texinfo node deduplication)
          curl -sL https://github.com/jgm/pandoc/releases/download/3.6.4/pandoc-3.6.4-1-amd64.deb -o pandoc.deb
          sudo dpkg -i pandoc.deb

      - name: Install mxpm
        run: |
          gh release download --repo cmsd2/maxima-mxpm --pattern 'mxpm-x86_64-unknown-linux-gnu.tar.gz'
          tar xzf mxpm-x86_64-unknown-linux-gnu.tar.gz
          sudo mv mxpm /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build docs
        run: mxpm doc build

      - name: Commit doc artifacts
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/*-doc-index.json *.info *-index.lisp
          git diff --cached --quiet || git commit -m "Update doc artifacts [skip ci]"
          git push

