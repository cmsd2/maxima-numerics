[package]
name = "numerics"
version = "0.1.0"
description = "NumPy-like numerical computing for Maxima (SBCL only)"
license = "MIT"
entry = "numerics.mac"
doc = "doc/numerics.md"
repository = "https://github.com/cmsd2/maxima-numerics"
keywords = ["numerics", "linear-algebra", "blas", "lapack", "ndarray"]

[lisp]
quicklisp_systems = ["magicl", "trivial-garbage", "alexandria", "cffi", "static-vectors"]

[test]
files = [
    "tests/test_constructors.mac",
    "tests/test_linalg.mac",
    "tests/test_elementwise.mac",
    "tests/test_slicing.mac",
    "tests/test_aggregation.mac",
    "tests/test_complex.mac",
    "tests/test_crossval.mac",
    "tests/test_optimize.mac",
    "tests/test_cobyla.mac",
    "tests/test_minpack.mac",
    "tests/test_integrate.mac",
    "tests/test_learn.mac",
]
