[package]
name = "numerics"
version = "0.1.0"
description = "NumPy-like numerical computing for Maxima (SBCL only)"
license = "MIT"
entry = "numerics.mac"
doc = "doc/numerics.md"
repository = "https://github.com/cmsd2/maxima-numerics"
keywords = ["numerics", "linear-algebra", "blas", "lapack", "ndarray"]

[lisp]
quicklisp_systems = ["magicl", "trivial-garbage", "alexandria", "cffi", "static-vectors"]

[test]
# Single-entry driver: the rtest_numerics.mac wrapper uses test_harness.mac
# (mxpm_run_tests) to sequence individual tests/test_*.mac files under
# snapshot/rollback isolation.  Listing the wrapper here means one Maxima
# subprocess per package (not per test file), matching the behaviour of
# `maxima --very-quiet -b rtest_numerics.mac` run directly.
files = ["rtest_numerics.mac"]
